<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Słówek</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .container {
            background: #fff;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .word-to-translate {
            font-size: 1.8rem;
            font-weight: bold;
            margin: 25px 0;
            color: #4a6cf7;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
        }

        input:focus {
            border-color: #4a6cf7;
            outline: none;
        }

        button {
            background: linear-gradient(135deg, #4a6cf7, #6c8cff);
            color: white;
            border: none;
            padding: 12px 25px;
            margin-top: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        #feedback {
            margin-top: 20px;
            font-weight: bold;
            min-height: 24px;
        }

        .correct {
            color: #2ecc71;
        }

        .wrong {
            color: #e74c3c;
        }

        #score {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #555;
        }

        #stats {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-weight: bold;
            margin-top: 10px;
        }

        #correctCount {
            color: #2ecc71;
        }

        #wrongCount {
            color: #e74c3c;
        }

        select {
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Test Słówek</h1>

    <label>Wybierz kategorię:</label><br>
    <select id="category" onchange="resetGame()">
        <option value="all">Wszystkie</option>
        <option value="view">What a view</option>
        <option value="warming">Global warming</option>
        <option value="future">Post-carbon future</option>
        <option value="dilemma">Moral dilemma</option>
        <option value="disasters">Disasters</option>
        <option value="climate">Climate</option>
    </select>

    <div class="word-to-translate" id="polishWord">Ładowanie...</div>

    <input type="text" id="englishInput" placeholder="Wpisz po angielsku...">

    <button onclick="checkAnswer()">Sprawdź</button>

    <div id="feedback"></div>

    <div id="score"></div>

    <div id="stats">
        <span id="correctCount">✔ 0</span>
        <span id="wrongCount">✖ 0</span>
    </div>
</div>

<script>
    const vocabulary = [
         // What a view
        { pl: "podziwiać krajobraz", en: "admire the landscape", cat: "view" },
        { pl: "na krawędzi klifu", en: "at the edges of the cliff", cat: "view" },
        { pl: "nad morzem", en: "at the seaside", cat: "view" },
        { pl: "widok zapierający dech w piersiach", en: "breathtaking view", cat: "view" },
        { pl: "jaskinia", en: "cave", cat: "view" },
        { pl: "wybrzeże", en: "coast", cat: "view" },
        { pl: "przepiękna sceneria", en: "gorgeous scenery", cat: "view" },
        { pl: "łąka", en: "grassland", cat: "view" },
        { pl: "dolina", en: "valley", cat: "view" },
        { pl: "wodospad", en: "waterfall", cat: "view" },
        { pl: "to takie proste", en: "as simple as that", cat: "view" },
        
        // Global warming
        { pl: "zmiana klimatu", en: "climate change", cat: "warming" },
        { pl: "wylesianie", en: "deforestation", cat: "warming" },
        { pl: "globalne ocieplenie", en: "global warming", cat: "warming" },
        { pl: "emisja gazów cieplarnianych", en: "greenhouse gas emission", cat: "warming" },
        { pl: "zasoby naturalne", en: "natural resources", cat: "warming" },
        { pl: "energia jądrowa", en: "nuclear energy", cat: "warming" },
        { pl: "elektrownia", en: "power station", cat: "warming" },
        { pl: "energia odnawialna", en: "renewable energy", cat: "warming" },
        { pl: "zrównoważony", en: "sustainable", cat: "warming" },
        { pl: "turbina wiatrowa", en: "wind turbine", cat: "warming" },
        { pl: "problemy z ochrona srodo", en: "environmental problem", cat: "warming" },
        
        
        // Post-carbon future
        { pl: "atmosfera", en: "atmosphere", cat: "future" },
        { pl: "aktywista na rzecz ochrony środowiska", en: "environmental activist", cat: "future" },
        { pl: "wystrzelić", en: "launch", cat: "future" },
        { pl: "warstwa ozonowa", en: "ozone layer", cat: "future" },
        { pl: "układ słoneczny", en: "solar system", cat: "future" },
        { pl: "rozrzucić / rozłożyć", en: "spread", cat: "future" },
        { pl: "kolonia", en: "colony", cat: "future" },
        { pl: "walczyc o cos", en: "fight for", cat: "future" },
        { pl: "mineral", en: "mineral", cat: "future" },
        { pl: "misja", en: "mission", cat: "future" },
        { pl: "kolonia", en: "colony", cat: "future" },
        { pl: "wyprawa na inna planete ", en: "planetary wxpedition", cat: "future" },
        { pl: "eksploracja kosmosu", en: "space exploration", cat: "future" },
        

        // Moral dilemma
        { pl: "konsekwencja", en: "consequence", cat: "dilemma" },
        { pl: "dylemat", en: "dilemma", cat: "dilemma" },
        { pl: "obowiązek", en: "duty", cat: "dilemma" },
        { pl: "stawiać czoła", en: "face", cat: "dilemma" },
        { pl: "winny", en: "guilty", cat: "dilemma" },
        { pl: "perspektywa", en: "guilty", cat: "perspective" },
        { pl: "zasada", en: "guilty", cat: "principle" },

        // Disasters
        { pl: "rafa koralowa", en: "coral reef", cat: "disasters" },
        { pl: "zagrożone gatunki", en: "endangered species", cat: "disasters" },
        { pl: "wymarcie", en: "extinction", cat: "disasters" },
        { pl: "srodowisko zycia", en: "habitat", cat: "disasters" },
        { pl: "migrowac", en: "migrate", cat: "disasters" },
        { pl: "brzeg", en: "shore", cat: "disasters" },
        { pl: "zanieczyszczać", en: "contaminate", cat: "disasters" },
        { pl: "istotny", en: "critical", cat: "disasters" },
        { pl: "ewakuowac", en: "evacuate", cat: "disasters" },
        { pl: "uciekac", en: "flrr", cat: "disasters" },
        { pl: "śnieżyca", en: "blizzard", cat: "disasters" },
        { pl: "cyklon", en: "contaminate", cat: "cyclone" },
        { pl: "erozja", en: "erosion", cat: "disasters" },
        { pl: "osuwisko", en: "landslide", cat: "disasters" },
        { pl: "fala plywowa", en: "tidal wave", cat: "disasters" },
        { pl: "topniejący lodowiec", en: "melting glacier", cat: "disasters" },

        // Weather
        { pl: "jakość powietrza", en: "air quality", cat: "climate" },
        { pl: "biodegradowalny", en: "biodegradable", cat: "climate" },
        { pl: "biodiveristy", en: "bioroznordny", cat: "climate" },
        { pl: "ślad węglowy", en: "carbon footprint", cat: "climate" },
        { pl: "wilgotność", en: "humidity", cat: "climate" },
        { pl: "ulewa", en: "downpour", cat: "climate" },
        { pl: "prognoza pogody", en: "weather forecast", cat: "climate" },
        { pl: "umiarkowny", en: "temperate", cat: "climate" },
        { pl: "uprawy", en: "crops", cat: "climate" },
        { pl: "ponury", en: "gloomy", cat: "climate" },
        { pl: "polkula", en: "hemisphere", cat: "climate" },
        { pl: "nieprzewidywalny", en: "unpredictable", cat: "climate" },
        { pl: "sezonowy", en: "seasonal", cat: "climate" },
        
    ];
    ];

    let currentList = [];
    let currentWordIndex = 0;
    let correctCount = 0;
    let wrongCount = 0;
    let totalAttempted = 0;

    function resetGame() {
        const cat = document.getElementById('category').value;

        if (cat === 'all') {
            currentList = [...vocabulary];
        } else {
            currentList = vocabulary.filter(w => w.cat === cat);
        }

        currentList.sort(() => Math.random() - 0.5);

        currentWordIndex = 0;
        correctCount = 0;
        wrongCount = 0;
        totalAttempted = 0;

        updateScore();
        nextWord();
    }

    function nextWord() {
        if (currentWordIndex >= currentList.length) {
            currentList.sort(() => Math.random() - 0.5);
            currentWordIndex = 0;
        }

        document.getElementById('polishWord').innerText =
            currentList[currentWordIndex].pl;

        document.getElementById('englishInput').value = '';
        document.getElementById('feedback').innerText = '';
        document.getElementById('englishInput').focus();
    }

    function checkAnswer() {
        const userAns = document.getElementById('englishInput').value.trim().toLowerCase();
        const correctAns = currentList[currentWordIndex].en.toLowerCase();
        const feedback = document.getElementById('feedback');

        totalAttempted++;

        if (userAns === correctAns) {
            feedback.innerText = "✔ Brawo!";
            feedback.className = "correct";
            correctCount++;
            setTimeout(nextWord, 1000);
        } else {
            feedback.innerText = `✖ Poprawna odpowiedź: ${currentList[currentWordIndex].en}`;
            feedback.className = "wrong";
            wrongCount++;
            setTimeout(nextWord, 2500);
        }

        currentWordIndex++;
        updateScore();
    }

    function updateScore() {
        document.getElementById('score').innerText =
            `Wynik: ${correctCount} / ${totalAttempted}`;

        document.getElementById('correctCount').innerText = `✔ ${correctCount}`;
        document.getElementById('wrongCount').innerText = `✖ ${wrongCount}`;
    }

    document.getElementById('englishInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            checkAnswer();
        }
    });

    resetGame();
</script>

</body>
</html>
