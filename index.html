<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Słówek</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Segoe UI",sans-serif;
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.app{
    width:100%;
    max-width:800px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:28px;
    padding:30px;
    box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

h1{
    text-align:center;
    margin-bottom:25px;
}

.hidden{
    display:none;
}

.categories{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.category-btn{
    padding:18px;
    border:none;
    border-radius:18px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    background:rgba(255,255,255,0.12);
    color:white;
    transition:0.2s;
}

.category-btn:hover{
    transform:translateY(-3px);
    background:rgba(255,255,255,0.2);
}

.all-btn{
    grid-column:1 / span 2;
}

.quiz-box{
    text-align:center;
}

.progress{
    margin-bottom:20px;
    color:#cbd5e1;
}

.word{
    font-size:30px;
    font-weight:bold;
    color:#93c5fd;
    margin:25px 0;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:16px;
    font-size:16px;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:16px;
    font-weight:bold;
    cursor:pointer;
}

.check{
    background:#2563eb;
    color:white;
}

.result-box{
    text-align:center;
}

.score{
    font-size:28px;
    margin:20px 0;
}

.errors{
    margin-top:20px;
    text-align:left;
    max-height:350px;
    overflow:auto;
    background:rgba(255,255,255,0.08);
    padding:15px;
    border-radius:18px;
}

.restart{
    margin-top:20px;
    background:#22c55e;
    color:white;
}

.polish-word{
    color:white;
    font-weight:bold;
}

.user-answer{
    color:#ef4444;
    font-weight:bold;
}

.correct-answer{
    color:#22c55e;
    font-weight:bold;
}

.error-row{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
    padding:10px 0;
    border-bottom:1px solid rgba(255,255,255,0.1);
}
</style>
</head>
<body>

<div class="app">

    <!-- WYBÓR KATEGORII -->
    <div id="categoryScreen">
        <h1>📘 Wybierz kategorię</h1>
        <div class="categories">
            <button class="category-btn all-btn" onclick="startQuiz('all')">Wszystkie</button>
            <button class="category-btn" onclick="startQuiz('wrong')">Whats Wrong</button>
            <button class="category-btn" onclick="startQuiz('foods')">Health Foods</button>
            <button class="category-btn" onclick="startQuiz('better')">Getting Better</button>
            <button class="category-btn" onclick="startQuiz('outbreaks')">Outbreaks</button>
            <button class="category-btn" onclick="startQuiz('emotions')">Managing Emotions</button>
            <button class="category-btn" onclick="startQuiz('conversation')">Conversation</button>
            <button class="category-btn" onclick="startQuiz('scientific')">Scientific</button>
            <button class="category-btn" onclick="startQuiz('products')">Food Products</button>
        </div>
    </div>

    <!-- QUIZ -->
    <div id="quizScreen" class="hidden">
        <div class="quiz-box">
            <div class="progress" id="progress"></div>
            <div class="word" id="word"></div>
            <input id="answer" placeholder="Wpisz po angielsku">
            <button class="check" onclick="checkAnswer()">Sprawdź</button>
            <div id="feedback" style="margin-top:15px;"></div>
        </div>
    </div>

    <!-- WYNIKI -->
    <div id="resultScreen" class="hidden">
        <div class="result-box">
            <h1>🏆 Wynik</h1>
            <div class="score" id="score"></div>
            <div class="errors" id="errorsList"></div>
            <button class="restart" onclick="goHome()">🔁 Powrót</button>
        </div>
    </div>

</div>

<script>

    { pl:"badanie krwi", en:"blood test", cat:"better" },
    { pl:";lekarstwo ", en:"cure", cat:"better" },
    { pl:"dostac recepte ", en:"get a prescription", cat:"better" },

    { pl:"utrzymywac/dbac o forme ", en:"keep in shape", cat:"better" },
    { pl:"zdrowie psychiczne ", en:"mental health", cat:"better" },
    { pl:"naturalne leczenie", en:"natural treatment", cat:"better" },

    { pl:"artetyzm", en:"arhritis", cat:"emotions" },
    { pl:"astma", en:"asthma", cat:"emotions" },

     { pl:"nowotwor", en:"cancer", cat:"emotions" },
     { pl:"wylew", en:"stroke ", cat:"emotions" },

    { pl:"dobrze sie rozwijac", en:"thrive", cat:"scientific" },
    { pl:"dobre samopoczucie", en:"well-being", cat:"scientific" },
    { pl:"wyspany", en:"well rested", cat:"scientific" },
    { pl:"rownonwaga meidzyz yciem zawodowym a prywatnym", en:"work life balance", cat:"scientific" },
    { pl:"uzalezniony", en:"addicted", cat:"scientific" },

    // Food Products
    { pl:"przeciwutleniacze", en:"antioxidiants", cat:"products" },
    { pl:"blonnik", en:"fibre", cat:"products" },
    { pl:"gluten", en:"gluten", cat:"products" },
    { pl:"zdrowe tluszcze", en:"healthy fats", cat:"products" },
    { pl:"skladniki odzywcze", en:"nutrients", cat:"products" },
    { pl:"organiczny", en:"organic", cat:"products" },
    { pl:"suplementy", en:"supplements", cat:"products" },
    { pl:"witamini i mineraly", en:"vitamins and minerals", cat:"products" },
    { pl:"pozne sniadanie", en:"brunch", cat:"products" },
    { pl:"drugie sniadanie", en:"elevenses", cat:"products" },
    { pl:"podgrzac ", en:"heat up", cat:"products" },
    { pl:"mierzyc", en:"measure", cat:"products" },
    { pl:"kuchenka mikrofalowa", en:"microwave", cat:"products" },
    { pl:"przerwa na herbate", en:"tea break", cat:"products" },
    { pl:"aerobik", en:"aerobics", cat:"products" },
    { pl:"elastyczny", en:"flexible", cat:"products" },
    { pl:"schudnac", en:"lose weight", cat:"products" },
    { pl:"wytrzynalosc", en:"stamina", cat:"products" },
    { pl:"wzmacniac", en:"strengthen", cat:"products" },
    { pl:"rozciagac sie", en:"stretch", cat:"products" },
    

];

let quizList = [];
let current = 0;
let score = 0;
let mistakes = [];

function startQuiz(category){

    if(category === "all"){
        quizList = vocabulary.filter(v => v.pl && v.en);
    } else {
        quizList = vocabulary.filter(v => v.cat === category && v.pl && v.en);
    }

    quizList.sort(() => Math.random() - 0.5);

    current = 0;
    score = 0;
    mistakes = [];

    document.getElementById("categoryScreen").classList.add("hidden");
    document.getElementById("quizScreen").classList.remove("hidden");

    showWord();
}

function showWord(){
    if(current >= quizList.length){
        finishQuiz();
        return;
    }

    document.getElementById("progress").innerText =
        `Słówko ${current+1} / ${quizList.length}`;

    document.getElementById("word").innerText = quizList[current].pl;
    document.getElementById("answer").value = "";
    document.getElementById("feedback").innerText = "";
}

function checkAnswer(){
    const user = document.getElementById("answer").value.trim();
    const correct = quizList[current].en;

    if(user.toLowerCase() === correct.toLowerCase()){
        score++;
        document.getElementById("feedback").innerText = "✔ Dobrze!";
    } else {
        mistakes.push({
            pl: quizList[current].pl,
            your: user || "(brak)",
            correct: correct
        });
        document.getElementById("feedback").innerText = "✖ " + correct;
    }

    current++;
    setTimeout(showWord, 900);
}

function finishQuiz(){
    document.getElementById("quizScreen").classList.add("hidden");
    document.getElementById("resultScreen").classList.remove("hidden");

    document.getElementById("score").innerText =
        `${score} / ${quizList.length}`;

    let html = "";

    if(mistakes.length === 0){
        html = "<p>Brak błędów 🎉</p>";
    } else {
        html += `
        <div class="error-row">
            <span class="polish-word">Polski</span>
            <span class="user-answer">Twoja odpowiedź</span>
            <span class="correct-answer">Poprawnie</span>
        </div>
        `;

        mistakes.forEach(m => {
            html += `
            <div class="error-row">
                <span class="polish-word">${m.pl}</span>
                <span class="user-answer">${m.your}</span>
                <span class="correct-answer">${m.correct}</span>
            </div>`;
        });
    }

    document.getElementById("errorsList").innerHTML = html;
}

function goHome(){
    document.getElementById("resultScreen").classList.add("hidden");
    document.getElementById("categoryScreen").classList.remove("hidden");
}

document.getElementById("answer").addEventListener("keypress", e=>{
    if(e.key === "Enter") checkAnswer();
});

</script>

</body>
</html>
