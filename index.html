<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Słówek</title>

<style>
body {
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

.container {
    background: white;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    width: 350px;
}

.word {
    font-size: 24px;
    font-weight: bold;
    color: #4a6cf7;
    margin: 20px 0;
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    margin-top: 10px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #4a6cf7;
    color: white;
    cursor: pointer;
}

.correct { color: green; }
.wrong { color: red; }

.stats {
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

    <h2>Test Słówek</h2>

    <select id="category" onchange="resetGame()">
        <option value="all">Wszystkie</option>
        <option value="view">What a view</option>
        <option value="warming">Global warming</option>
        <option value="future">Post-carbon future</option>
        <option value="dilemma">Moral dilemma</option>
        <option value="disasters">Disasters</option>
        <option value="climate">Climate</option>
    </select>

    <div class="word" id="polishWord"></div>

    <input id="input" placeholder="Wpisz po angielsku">

    <br>

    <button onclick="checkAnswer()">Sprawdź</button>
    <button onclick="nextWord()">Dalej</button>

    <div id="feedback"></div>

    <div class="stats">
        ✔ <span id="correct">0</span> |
        ✖ <span id="wrong">0</span>
    </div>

</div>

<script>

const vocabulary = [
     // What a view

        { pl: "na krawędzi klifu", en: "at the edges of the cliff", cat: "view" },
        { pl: "nad morzem", en: "at the seaside", cat: "view" },
        { pl: "widok zapierający dech w piersiach", en: "breathtaking view", cat: "view" },
        { pl: "jaskinia", en: "cave", cat: "view" },
        { pl: "wybrzeże", en: "coast", cat: "view" },

        { pl: "przegapic", en: "miss out on", cat: "view" },
        { pl: "mnie pasuje", en: "fine by me", cat: "view" },
        { pl: "nie widzeic sensu", en: "didnt see the point", cat: "view" },
        { pl: "przed smiercia ", en: "bucket list", cat: "view" },
        { pl: "smiertelnie zmeczony", en: "dead tired", cat: "view" },
        { pl: "obszar leśny", en: "woodland area", cat: "view" },
        { pl: "strumien gorski", en: "mountain stream", cat: "view" },
        
        // Global warming
        { pl: "zmiana klimatu", en: "climate change", cat: "warming" },
        { pl: "wylesianie", en: "deforestation", cat: "warming" },
        { pl: "globalne ocieplenie", en: "global warming", cat: "warming" },
        { pl: "emisja gazów cieplarnianych", en: "greenhouse gas emission", cat: "warming" },
        { pl: "zasoby naturalne", en: "natural resources", cat: "warming" },
        { pl: "energia jądrowa", en: "nuclear energy", cat: "warming" },
        { pl: "elektrownia", en: "power station", cat: "warming" },
        { pl: "energia odnawialna", en: "renewable energy", cat: "warming" },
        { pl: "zrównoważony", en: "sustainable", cat: "warming" },
        { pl: "turbina wiatrowa", en: "wind turbine", cat: "warming" },
        { pl: "problemy z ochrona srodo", en: "environmental problem", cat: "warming" },
        { pl: "przetwarzanie odpadow", en: "recycling waste", cat: "warming" },
        { pl: "zanieczyszczac atmosfere", en: "polluting the atmosphere", cat: "warming" },
        { pl: "szkodzic", en: "harm", cat: "warming" },
        { pl: "miec wplyw na ", en: "have an impact on", cat: "warming" },
        { pl: "panel sloneczny", en: "solar panel", cat: "warming" },

        
        
        // Post-carbon future
        { pl: "atmosfera", en: "atmosphere", cat: "future" },
        { pl: "aktywista na rzecz ochrony środowiska", en: "environmental activist", cat: "future" },
        { pl: "wystrzelić", en: "launch", cat: "future" },
        { pl: "warstwa ozonowa", en: "ozone layer", cat: "future" },
        { pl: "układ słoneczny", en: "solar system", cat: "future" },
        { pl: "rozrzucić / rozłożyć", en: "spread", cat: "future" },
        { pl: "kolonia", en: "colony", cat: "future" },
        { pl: "walczyc o cos", en: "fight for", cat: "future" },
        { pl: "mineral", en: "mineral", cat: "future" },
        { pl: "misja", en: "mission", cat: "future" },
        { pl: "wyprawa na inna planete ", en: "planetary expedition", cat: "future" },
        { pl: "eksploracja kosmosu", en: "space exploration", cat: "future" },
        { pl: "cieplarnia", en: "greenhouse", cat: "future" },
        { pl: "orbitowac", en: "orbit", cat: "future" },
        { pl: "statek kosmiczny", en: "rocket", cat: "future" },

        

        // Moral dilemma
        { pl: "konsekwencja", en: "consequence", cat: "dilemma" },
        { pl: "dylemat", en: "dilemma", cat: "dilemma" },
        { pl: "obowiązek", en: "duty", cat: "dilemma" },
        { pl: "stawiać czoła", en: "face", cat: "dilemma" },
        { pl: "winny", en: "guilty", cat: "dilemma" },
        { pl: "perspektywa", en: "perspective", cat: "dilemma" },
        { pl: "zasada", en: "principle", cat: "dilemma" },

        // Disasters
        { pl: "rafa koralowa", en: "coral reef", cat: "disasters" },
        { pl: "zagrożone gatunki", en: "endangered species", cat: "disasters" },
        { pl: "wymarcie", en: "extinction", cat: "disasters" },
        { pl: "srodowisko zycia", en: "habitat", cat: "disasters" },
        { pl: "migrowac", en: "migrate", cat: "disasters" },
        { pl: "brzeg", en: "shore", cat: "disasters" },
        { pl: "zanieczyszczać", en: "contaminate", cat: "disasters" },
        { pl: "istotny", en: "critical", cat: "disasters" },
        { pl: "ewakuowac", en: "evacuate", cat: "disasters" },
        { pl: "uciekac", en: "flee", cat: "disasters" },
        { pl: "śnieżyca", en: "blizzard", cat: "disasters" },
        { pl: "cyklon", en: "cyclone", cat: "disasters" },
        { pl: "erozja", en: "erosion", cat: "disasters" },
        { pl: "osuwisko", en: "landslide", cat: "disasters" },
        { pl: "fala plywowa", en: "tidal wave", cat: "disasters" },
        { pl: "topniejący lodowiec", en: "melting glacier", cat: "disasters" },
        { pl: "rezerwat przyrodowy", en: "nature reserve", cat: "disasters" },
        { pl: "radioaktywny", en: "radioactive", cat: "disasters" },
        { pl: "toksyczny", en: "toxic", cat: "disasters" },



        // Weather
        { pl: "jakość powietrza", en: "air quality", cat: "climate" },
        { pl: "biodegradowalny", en: "biodegradable", cat: "climate" },
        { pl: "bioroznorodnosc", en: "biodiveristy", cat: "climate" },
        { pl: "ślad węglowy", en: "carbon footprint", cat: "climate" },
        { pl: "wilgotność", en: "humidity", cat: "climate" },
        { pl: "ulewa", en: "downpour", cat: "climate" },
        { pl: "prognoza pogody", en: "weather forecast", cat: "climate" },
        { pl: "umiarkowny", en: "temperate", cat: "climate" },
        { pl: "uprawy", en: "crops", cat: "climate" },
        { pl: "ponury", en: "gloomy", cat: "climate" },
        { pl: "polkula", en: "hemisphere", cat: "climate" },
        { pl: "nieprzewidywalny", en: "unpredictable", cat: "climate" },
        { pl: "sezonowy", en: "seasonal", cat: "climate" },
        { pl: "ekosystem", en: "ecosystem", cat: "climate" },
        { pl: "zmienny", en: "changeable", cat: "climate" },


        
    
];

let list = [];
let index = 0;
let correct = 0;
let wrong = 0;

function resetGame() {
    const cat = document.getElementById("category").value;

    list = (cat === "all")
        ? [...vocabulary]
        : vocabulary.filter(v => v.cat === cat);

    list.sort(() => Math.random() - 0.5);

    index = 0;
    correct = 0;
    wrong = 0;

    update();
    showWord();

    document.getElementById("feedback").innerText = "";
}

function showWord() {
    if (index >= list.length) {
        endGame();
        return;
    }

    document.getElementById("polishWord").innerText = list[index].pl;
    document.getElementById("input").value = "";
}

function checkAnswer() {
    if (index >= list.length) return;

    const user = document.getElementById("input").value.trim().toLowerCase();
    const correctAns = list[index].en.toLowerCase();

    if (user === correctAns) {
        document.getElementById("feedback").innerText = "✔ Dobrze!";
        document.getElementById("feedback").className = "correct";
        correct++;
    } else {
        document.getElementById("feedback").innerText = "✖ " + list[index].en;
        document.getElementById("feedback").className = "wrong";
        wrong++;
    }

    update();
    index++;
    setTimeout(showWord, 800);
}

function update() {
    document.getElementById("correct").innerText = correct;
    document.getElementById("wrong").innerText = wrong;
}

function endGame() {
    document.getElementById("polishWord").innerText = "Koniec!";
    document.getElementById("input").style.display = "none";
    document.querySelector("button[onclick='checkAnswer()']").style.display = "none";
    document.querySelector("button[onclick='nextWord()']").style.display = "none";

    document.getElementById("feedback").innerHTML =
        `Twój wynik: ${correct} / ${list.length}`;

    // przycisk restartu
    const btn = document.createElement("button");
    btn.innerText = "🔁 Zrób ponownie";
    btn.onclick = () => location.reload();
    document.querySelector(".container").appendChild(btn);
}

document.getElementById("input").addEventListener("keypress", e => {
    if (e.key === "Enter") checkAnswer();
});

resetGame();

</script>

</body>
</html>
