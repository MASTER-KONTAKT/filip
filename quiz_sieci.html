<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Standardy IEEE 802</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #d35400;
            --bg: #f4f6f7;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --correct: #2ecc71;
            --incorrect: #e74c3c;
            --border: #bdc3c7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 25px;
            font-size: 26px;
            border-bottom: 3px solid var(--accent);
            padding-bottom: 10px;
        }

        .btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover { background-color: #b33939; }
        .btn:active { transform: scale(0.98); }

        .btn-back {
            background-color: #7f8c8d;
            margin-top: 15px;
        }
        .btn-back:hover { background-color: #95a5a6; }

        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #ecf0f1;
            border-radius: 4px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background-color: var(--accent);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-box {
            font-size: 19px;
            font-weight: 600;
            margin-bottom: 30px;
            color: var(--primary);
            text-align: center;
        }

        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        @media (max-width: 500px) {
            .options-container {
                grid-template-columns: 1fr;
            }
        }

        .option {
            background-color: #fafafa;
            border: 2px solid var(--border);
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            text-align: center;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .option:hover {
            background-color: #fef5e7;
            border-color: var(--accent);
        }

        .option.correct {
            background-color: rgba(46, 204, 113, 0.2);
            border-color: var(--correct);
            color: #1b7a43;
            font-weight: bold;
        }

        .option.incorrect {
            background-color: rgba(231, 76, 60, 0.2);
            border-color: var(--incorrect);
            color: #b83227;
        }

        .option.disabled { pointer-events: none; }

        .feedback {
            font-size: 16px;
            margin-bottom: 25px;
            font-weight: 500;
            min-height: 24px;
            text-align: center;
        }

        .score-section {
            text-align: center;
            padding: 20px;
        }

        .score-display {
            font-size: 54px;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>Quiz: Standardy IEEE 802</h1>
    
    <div id="setup-section" style="text-align: center;">
        <p style="font-size: 17px; margin-bottom: 30px;">Szybki sprawdzian z dopasowywania numerów norm IEEE 802 do odpowiadających im technologii sieciowych.</p>
        <button class="btn" onclick="startQuiz()">Rozpocznij test (10 pytań)</button>
        <br>
        <a href="index.html" class="btn btn-back">&larr; Powrót do menu głównego</a>
    </div>

    <div id="quiz-section" class="hidden">
        <div class="progress-bar">
            <div id="progress" class="progress"></div>
        </div>
        
        <div id="question-num" style="font-size: 14px; color: #7f8c8d; margin-bottom: 5px; text-align: center;"></div>
        <div id="question" class="question-box"></div>

        <div id="options" class="options-container"></div>
        
        <div id="feedback" class="feedback"></div>
        <div style="text-align: center;">
            <button id="next-btn" class="btn hidden" onclick="nextQuestion()">Następne pytanie &rarr;</button>
        </div>
    </div>

    <div id="score-section" class="score-section hidden">
        <div style="font-size: 24px; font-weight: bold; color: var(--primary); margin-bottom: 15px;">Twój wynik:</div>
        <div id="score-display" class="score-display">0 / 0</div>
        <div id="score-pct" style="font-size: 18px; margin-bottom: 30px;"></div>
        
        <div style="display: flex; flex-direction: column; gap: 10px; max-width: 300px; margin: 0 auto;">
            <button class="btn" onclick="resetQuiz()">Zagraj jeszcze raz</button>
            <a href="index.html" class="btn btn-back" style="margin: 0;">Menu główne</a>
        </div>
    </div>
</div>

<script>
    // Baza standardów prosto z Twojego screena
    const ieeeData = [
        { num: '802.3', tech: 'Kabel / Ethernet' },
        { num: '802.5', tech: 'Pierścień / Token Ring' },
        { num: '802.11', tech: 'Wi-Fi / WLAN' },
        { num: '802.15', tech: 'Bluetooth' },
        { num: '802.1Q', tech: 'VLAN (Tagowanie)' },
        { num: '802.1X', tech: 'Logowanie / RADIUS' },
        { num: '802.1D', tech: 'Blokowanie pętli / STP' }
    ];

    let currentIdx = 0;
    let score = 0;
    const totalQuestions = 10;
    let questionsPool = [];

    function generateIEEEQuestions() {
        const pool = [];
        
        for (let i = 0; i < totalQuestions; i++) {
            // Losujemy jeden ze standardów jako główny temat pytania
            const currentStandard = ieeeData[Math.floor(Math.random() * ieeeData.length)];
            
            // Losujemy kierunek pytania (50% szans)
            const askForTech = Math.random() > 0.5;

            if (askForTech) {
                // Pytamy: "Co oznacza numer 802.x?"
                const wrongOptions = ieeeData.filter(item => item.tech !== currentStandard.tech).map(item => item.tech);
                wrongOptions.sort(() => Math.random() - 0.5);
                
                const finalChoices = [currentStandard.tech, wrongOptions[0], wrongOptions[1], wrongOptions[2]];
                finalChoices.sort(() => Math.random() - 0.5);

                pool.push({
                    questionText: `Z jaką technologią lub funkcją kojarzysz standard oznaczony numerem <strong>IEEE ${currentStandard.num}</strong>?`,
                    correctAnswer: currentStandard.tech,
                    options: finalChoices
                });
            } else {
                // Pytamy: "Który numer ma technologia XYZ?"
                const wrongOptions = ieeeData.filter(item => item.num !== currentStandard.num).map(item => item.num);
                wrongOptions.sort(() => Math.random() - 0.5);
                
                const finalChoices = [currentStandard.num, wrongOptions[0], wrongOptions[1], wrongOptions[2]];
                finalChoices.sort(() => Math.random() - 0.5);

                pool.push({
                    questionText: `Który standard z rodziny IEEE odpowiada za technologię: <strong>${currentStandard.tech}</strong>?`,
                    correctAnswer: currentStandard.num,
                    options: finalChoices
                });
            }
        }
        return pool;
    }

    function startQuiz() {
        currentIdx = 0;
        score = 0;
        questionsPool = generateIEEEQuestions();

        document.getElementById("setup-section").classList.add("hidden");
        document.getElementById("score-section").classList.add("hidden");
        document.getElementById("quiz-section").classList.remove("hidden");

        showQuestion();
    }

    function showQuestion() {
        document.getElementById("next-btn").classList.add("hidden");
        document.getElementById("feedback").innerText = "";
        
        const qNum = document.getElementById("question-num");
        const qBox = document.getElementById("question");
        const optionsBox = document.getElementById("options");
        const progress = document.getElementById("progress");

        qNum.innerText = `Pytanie ${currentIdx + 1} z ${totalQuestions}`;
        progress.style.width = `${(currentIdx / totalQuestions) * 100}%`;

        const currentQ = questionsPool[currentIdx];
        qBox.innerHTML = currentQ.questionText;

        optionsBox.innerHTML = "";
        
        currentQ.options.forEach(opt => {
            const button = document.createElement("button");
            button.className = "option";
            button.innerText = opt;
            button.onclick = () => verifyAnswer(button, opt, currentQ.correctAnswer);
            optionsBox.appendChild(button);
        });
    }

    function verifyAnswer(clickedButton, chosen, correct) {
        const allOptions = document.querySelectorAll(".option");
        allOptions.forEach(opt => {
            opt.classList.add("disabled");
            if (opt.innerText === correct) {
                opt.classList.add("correct");
            }
        });

        const feedback = document.getElementById("feedback");
        if (chosen === correct) {
            clickedButton.classList.add("correct");
            feedback.innerHTML = "<span style='color: var(--correct); font-weight: bold;'>&check; Dobrze! To prawidłowa odpowiedź.</span>";
            score++;
        } else {
            clickedButton.classList.add("incorrect");
            feedback.innerHTML = `<span style='color: var(--incorrect); font-weight: bold;'>&cross; Błąd! Poprawna odpowiedź to: <strong>${correct}</strong></span>`;
        }

        document.getElementById("next-btn").classList.remove("hidden");
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < totalQuestions) {
            showQuestion();
        } else {
            displayFinalScore();
        }
    }

    function displayFinalScore() {
        document.getElementById("quiz-section").classList.add("hidden");
        const scoreSec = document.getElementById("score-section");
        scoreSec.classList.remove("hidden");

        document.getElementById("score-display").innerText = `${score} / ${totalQuestions}`;
        const percentage = Math.round((score / totalQuestions) * 100);
        
        let message = "";
        if (percentage === 100) message = "Rewelacja! Wszystkie standardy znasz na pamięć! 🎯";
        else if (percentage >= 80) message = "Świetny wynik! Te normy nie mają przed Tobą tajemnic. 🚀";
        else if (percentage >= 50) message = "Zaliczone! Warto jednak rzucić okiem na te trudniejsze (np. 802.1Q czy 802.1D). 📑";
        else message = "Musisz jeszcze poćwiczyć. Przejrzyj zestawienie standardów i spróbuj znowu! 🔍";

        document.getElementById("score-pct").innerText = `${percentage}% - ${message}`;
    }

    function resetQuiz() {
        document.getElementById("score-section").classList.add("hidden");
        document.getElementById("setup-section").classList.remove("hidden");
    }
</script>

</body>
</html>
